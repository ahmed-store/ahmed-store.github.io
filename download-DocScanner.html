<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- تاج الميتا كأمان احتياطي (خليناه 5 ثواني) -->
    <meta id="meta-redirect" http-equiv="refresh" content="5; URL='https://github.com/ahmed-store/Ahmed-Shahawy-Doc-Scanner/releases/download/Version_1.0/DocScanner.apk'">
    
    <title>جاري التحويل...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .download-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .countdown-circle { font-size: 2.5rem; color: #3498db; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="download-card">
    <h4>جاري تحضير الرابط</h4>
    <div class="countdown-circle" id="seconds">5</div>
    <p class="text-muted">سيتم تحويلك تلقائياً للتحميل.</p>
    <hr>
    <a href="https://github.com/ahmed-store/Ahmed-Shahawy-Doc-Scanner/releases/download/Version_1.0/DocScanner.apk" class="btn btn-primary w-100">تحميل مباشر</a>
    
    <!-- تظهر فقط لو الجافا سكريبت معطل -->
    <noscript>
        <div class="alert alert-warning mt-3 small">
            الجافا سكريبت معطل، سيتم التحويل تلقائياً خلال لحظات...
        </div>
    </noscript>
</div>

<script>
    let seconds = 3; // عدد الثواني للجافا سكريبت
    const display = document.getElementById('seconds');
    const targetURL = "https://your-link.com/file.zip";

    const interval = setInterval(() => {
        seconds--;
        display.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = targetURL;
        }
    }, 1000);
</script>

</body>
</html>
